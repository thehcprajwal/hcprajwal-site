services:

  # ── App ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hc-system
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    networks:
      - web
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3001/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

  # ── Caddy ─────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv/dist:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    depends_on:
      app:
        condition: service_healthy

networks:
  web:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
